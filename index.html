<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚太国际人民事业发展共同体 - 版本选择</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a2540 0%, #0a3a6b 55%, #0a2540 100%);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .brand { font-size: 1.4rem; letter-spacing: 4px; opacity: .85; margin-bottom: 2.2rem; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: .6rem; }
        p.sub { opacity: .75; margin-bottom: 2.6rem; font-size: 1.05rem; }
        .cards { display: flex; gap: 1.6rem; flex-wrap: wrap; justify-content: center; }
        .card {
            display: block;
            width: 280px;
            padding: 2rem 1.6rem;
            border-radius: 16px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.16);
            text-decoration: none;
            color: #fff;
            transition: transform .18s ease, background .18s ease, border-color .18s ease;
        }
        .card:hover { transform: translateY(-6px); background: rgba(255,255,255,.12); border-color: rgba(120,190,255,.7); }
        .card .tag { display: inline-block; font-size: .8rem; padding: .2rem .7rem; border-radius: 999px; background: rgba(120,190,255,.22); margin-bottom: 1rem; }
        .card h2 { font-size: 1.45rem; margin-bottom: .5rem; }
        .card p { font-size: .92rem; opacity: .78; line-height: 1.6; }
        footer { margin-top: 3rem; font-size: .8rem; opacity: .5; }
    </style>
</head>
<body>
    <div class="brand">亚太国际人民事业发展共同体</div>
    <h1>请选择要访问的版本</h1>
    <p class="sub">以下两个入口为内容不同的两个版本，请根据需要选择</p>

    <div class="cards">
        <a class="card" href="/a/index.html">
            <span class="tag">完整版 A</span>
            <h2>标准网站</h2>
            <p>全量栏目与内容，包含全部产业科研板块。</p>
        </a>
        <a class="card" href="/b/index.html">
            <span class="tag">精简版 B</span>
            <h2>精简网站</h2>
            <p>在 A 版基础上精简，移除了部分科研子栏目。</p>
        </a>
    </div>

    <footer>© 亚太国际人民事业发展共同体</footer>
</body>
</html>
