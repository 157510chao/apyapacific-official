<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#061629"/>
            <stop offset="50%" stop-color="#0a2540"/>
            <stop offset="100%" stop-color="#1e3a8a"/>
        </linearGradient>
        <radialGradient id="r1" cx="80%" cy="20%">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity=".3"/>
            <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="r2" cx="20%" cy="80%">
            <stop offset="0%" stop-color="#2563eb" stop-opacity=".25"/>
            <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
    </defs>
    <rect width="1920" height="1080" fill="url(#g)"/>
    <rect width="1920" height="1080" fill="url(#r1)"/>
    <rect width="1920" height="1080" fill="url(#r2)"/>
    <!-- 装饰圆弧 -->
    <circle cx="1600" cy="200" r="500" fill="none" stroke="#67e8f9" stroke-opacity=".15" stroke-width="1"/>
    <circle cx="1600" cy="200" r="400" fill="none" stroke="#67e8f9" stroke-opacity=".1" stroke-width="1"/>
    <circle cx="1600" cy="200" r="300" fill="none" stroke="#67e8f9" stroke-opacity=".08" stroke-width="1"/>
    <!-- 网格 -->
    <g stroke="#67e8f9" stroke-opacity=".06" stroke-width="1">
        <line x1="0" y1="270" x2="1920" y2="270"/>
        <line x1="0" y1="540" x2="1920" y2="540"/>
        <line x1="0" y1="810" x2="1920" y2="810"/>
        <line x1="480" y1="0" x2="480" y2="1080"/>
        <line x1="960" y1="0" x2="960" y2="1080"/>
        <line x1="1440" y1="0" x2="1440" y2="1080"/>
    </g>
</svg>
